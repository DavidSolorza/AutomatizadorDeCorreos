name: Deploy Demo (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Build demo (mock + GitHub Pages base path)
        working-directory: frontend
        env:
          VITE_USE_MOCK: 'true'
          VITE_BASE_PATH: /AutomatizadorDeCorreos/
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: npm run build

      - name: Verify build output
        working-directory: frontend
        run: |
          test -f dist/index.html
          test -f dist/.nojekyll
          grep -q "AutomatizadorDeCorreos/assets" dist/index.html
          echo "Build OK"

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/dist
          publish_branch: gh-pages
          force_orphan: true
          commit_message: 'Deploy demo from ${{ github.sha }}'
