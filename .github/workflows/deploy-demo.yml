name: Deploy Demo (GitHub Pages)

on:
  push:
    branches: [main, despliegue]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-gh-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build standalone frontend
        working-directory: frontend
        env:
          VITE_STANDALONE: 'true'
          VITE_USE_MOCK: 'true'
          VITE_BASE_PATH: /AutomatizadorDeCorreos/
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: pnpm run build

      - name: Verify build output
        working-directory: frontend
        run: |
          test -f dist/index.html
          test -f dist/404.html
          test -f dist/.nojekyll
          grep -q "AutomatizadorDeCorreos/assets" dist/index.html
          echo "Build OK"

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
